<!doctype html>
<html>
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>

        #root {
          position: absolute; inset: 0; width: 1080px; height: 1920px; overflow: hidden;
          background: #F8F7F4;
          font-family: 'Inter', sans-serif; color: #111111;
        }

        /* ---- macro drift under the whole shot ---- */
        .stage { position: absolute; inset: 0; will-change: transform; }

        /* ---- device: the REAL warehouse screenshot is the hero ---- */
        .device {
          position: absolute;
          top: 150px; left: 50%;
          width: 860px; height: 1440px;
          transform: translateX(-50%);
          border-radius: 34px; overflow: hidden;
          background: #FFFFFF;
          border: 1px solid #ECEAE5;
          box-shadow: 0 1px 2px rgba(17,17,17,.04), 0 18px 50px rgba(17,17,17,.12);
          will-change: transform, opacity;
        }
        .device-img {
          position: absolute; top: 0; left: 0;
          width: 100%; height: 100%;
          object-fit: cover;
          object-position: top center;
          will-change: transform;
          /* the screenshot's top ~80% shows; bottom nav + PWA banner cropped by the
             container height + cover crop */
        }
        /* warm hairline vignette so the white card edges read against the screenshot */
        .device-edge {
          position: absolute; inset: 0; border-radius: 34px; pointer-events: none;
          box-shadow: inset 0 0 0 1px rgba(17,17,17,.05);
        }

        /* ---- kinetic OVERLAY: the split-shipping callout — a real Flowva CARD ---- */
        /* anchored low over the parcel zone of the screenshot, inside keep-out (y<=1600) */
        .callout {
          position: absolute;
          left: 50%; top: 1130px;
          transform: translateX(-50%);
          width: 712px;
          background: #FFFFFF;
          border: 1px solid #ECEAE5;
          border-radius: 24px;
          box-shadow: 0 1px 2px rgba(17,17,17,.04), 0 10px 30px rgba(17,17,17,.07);
          padding: 30px 38px 34px;
          display: flex; flex-direction: column; align-items: center; gap: 4px;
          will-change: transform, opacity;
        }

        /* small uppercase Flowva label */
        .callout-label {
          font-size: 22px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase;
          color: #9C9893;
          will-change: opacity, transform;
        }

        .figure-wrap {
          display: flex; align-items: baseline; justify-content: center;
          height: 220px; margin-top: 4px;
          will-change: transform;
        }
        /* the big figure — heavy Inter, tabular */
        .figure {
          font-weight: 800; color: #111111;
          font-variant-numeric: tabular-nums;
          letter-spacing: -3px; line-height: 1; font-size: 140px;
          will-change: transform, color;
        }

        /* round Flowva friend-avatars (ink / field) that pop in one by one */
        .avatars {
          display: flex; align-items: center; justify-content: center; gap: 16px;
          margin-top: 8px; height: 70px;
        }
        .av-dot {
          width: 62px; height: 62px; border-radius: 50%;
          background: #F3F1ED; border: 1px solid #ECEAE5;
          display: grid; place-items: center;
          font-size: 24px; font-weight: 700; color: #6E6B66; letter-spacing: .2px;
          transform: scale(0);
          will-change: transform, opacity;
        }
        /* "Split across friends" with the 🦊 brand mark */
        .av-caption {
          margin-top: 18px;
          font-size: 27px; font-weight: 600; letter-spacing: .1px; color: #6E6B66;
          display: flex; align-items: center; gap: 9px;
          will-change: opacity, transform;
        }
        .av-caption .fox { font-size: 30px; line-height: 1; }
      </style>

      <div id="root" data-composition-id="06-shop-together-split-shipping" data-width="1080" data-height="1920">
        <div class="stage" id="stage">

          <!-- HERO: the real "My warehouse" screenshot rising into a device card -->
          <div class="device" id="device">
            <img class="device-img" id="deviceImg"
                 src="assets/app/real-warehouse.png" alt="" />
            <div class="device-edge"></div>
          </div>

          <!-- KINETIC OVERLAY: split-shipping callout -->
          <div class="callout" id="callout">
            <div class="callout-label" id="calloutLabel">SHIPPING / ITEM</div>
            <div class="figure-wrap">
              <span class="figure" id="figure">&euro;11.70</span>
            </div>
            <div class="avatars" id="avatars">
              <span class="av-dot" data-av>J</span>
              <span class="av-dot" data-av>M</span>
              <span class="av-dot" data-av>S</span>
              <span class="av-dot" data-av>L</span>
            </div>
            <div class="av-caption" id="avCaption"><span class="fox">🦊</span>Split across friends</div>
          </div>

        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        const TOTAL = 5.0;
        const figureEl = document.getElementById('figure');
        const dots = Array.from(document.querySelectorAll('[data-av]'));

        /* ---- macro: very gentle push under the whole shot ---- */
        tl.fromTo('#stage',
          { scale: 1.012, y: 6 },
          { scale: 1.0, y: 0, duration: TOTAL, ease: 'power1.out', overwrite: 'auto' }, 0);

        /* ============================================================
           ENTRANCE — the real warehouse screenshot RISES into the card
           (gsap.fromTo so re-seek replays cleanly)
           ============================================================ */
        tl.fromTo('#device',
          { opacity: 0, y: 60, scale: 0.98 },
          { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'power3.out', overwrite: 'auto' }, 0.0);

        /* ken-burns: slow scale 1.0 -> 1.04 across the whole shot (never a static slab) */
        tl.fromTo('#deviceImg',
          { scale: 1.0 },
          { scale: 1.04, duration: TOTAL, ease: 'none', overwrite: 'auto' }, 0.0);

        /* ---- callout card rises in just after the screen lands ---- */
        tl.fromTo('#callout',
          { opacity: 0, y: 34, scale: 0.97 },
          { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: 'power3.out', overwrite: 'auto' }, 0.5);
        tl.fromTo('#calloutLabel',
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.45, ease: 'power2.out', overwrite: 'auto' }, 0.62);
        tl.fromTo('#figure',
          { opacity: 0, y: 16, scale: 0.96 },
          { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'power3.out', overwrite: 'auto' }, 0.66);
        tl.fromTo('#avCaption',
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.45, ease: 'power2.out', overwrite: 'auto' }, 0.8);

        /* ============================================================
           DEVELOPMENT — friend avatars pop in one by one; each pop drops
           the per-item shipping figure a step (counting-dynamic-scale:
           the number is the hero, its weight GROWS as it lands smaller).
           Steps: EUR 11.70 -> EUR 5.80 -> EUR 3.90
           ============================================================ */
        // beat schedule: avatar i pops at POP_T[i]
        const POP_T = [1.05, 1.75, 2.45, 3.15];
        // shipping figure value AFTER each avatar lands (first two friends -> 5.80,
        // then a step at the 3rd, final step at the 4th = the emotional peak)
        const STEPS = ['€11.70', '€11.70', '€5.80', '€3.90'];
        // escalating visual weight as it lands (counting-dynamic-scale font growth)
        const SIZE  = [140, 150, 174, 212];

        for (let i = 0; i < dots.length; i++) {
          const at = POP_T[i];

          // avatar dot pops in (back.out overshoot)
          tl.fromTo(dots[i],
            { opacity: 0, scale: 0, y: 12 },
            { opacity: 1, scale: 1, y: 0, duration: 0.46, ease: 'back.out(1.9)', overwrite: 'auto' }, at);

          const changed = STEPS[i] !== STEPS[i - 1];
          if (changed) {
            const isFinal = (i === dots.length - 1);

            // discrete value swap exactly as the avatar lands (deterministic tl.set)
            tl.set(figureEl, { textContent: STEPS[i] }, at + 0.16);

            // weight punch on the swap: a quick down->up grow into the new step
            tl.fromTo(figureEl,
              { scale: 0.9 },
              { scale: 1, duration: 0.44, ease: 'back.out(1.8)', overwrite: 'auto' }, at + 0.16);

            // grow the underlying font-size (escalating weight as it ticks down)
            tl.to(figureEl,
              { fontSize: SIZE[i] + 'px', duration: 0.5, ease: 'power3.out', overwrite: 'auto' }, at + 0.16);

            if (isFinal) {
              // FINAL EUR 3.90 lands BOLD vos-orange — orange owns ONLY this figure
              tl.to(figureEl,
                { color: '#FF5C00', duration: 0.4, ease: 'power2.out', overwrite: 'auto' }, at + 0.18);
            }
          } else {
            // no step change, but give the figure a tiny acknowledging pulse on the pop
            tl.to(figureEl,
              { scale: 1.03, duration: 0.16, ease: 'power2.out', overwrite: 'auto' }, at + 0.16);
            tl.to(figureEl,
              { scale: 1.0, duration: 0.22, ease: 'power2.out', overwrite: 'auto' }, at + 0.32);
          }
        }

        /* ============================================================
           SETTLE — the landed orange EUR 3.90 breathes once (sine-wave-loop).
           Begins AFTER every figure tween has settled so the breathe never
           races a GSAP transform on the same element. Driven through gsap.set
           so x/y/scale stay seek-safe. sin(0)=0 => no jump from the landed state.
           ============================================================ */
        const IDLE_START = 3.85;                 // last figure tween ends ~3.71
        const IDLE_DUR = TOTAL - IDLE_START;     // 1.15s
        const phase = { p: 0 };
        tl.to(phase, {
          p: Math.PI * 2 * 1.0,                  // one calm breath
          duration: IDLE_DUR,
          ease: 'none',
          onUpdate: () => {
            const s = 1 + Math.sin(phase.p) * 0.020;
            const y = Math.sin(phase.p) * 3;
            gsap.set(figureEl, { y: y, scale: s });
          }
        }, IDLE_START);

        window.__timelines["06-shop-together-split-shipping"] = tl;
      </script>
    </template>
  </body>
</html>
